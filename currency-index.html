<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Central Asia Currency Converter</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #f5f2ec;
      --white: #ffffff;
      --navy: #0d1b2a;
      --navy-mid: #1a3348;
      --copper: #b5651d;
      --copper-light: #d4854a;
      --copper-pale: #f0e0d0;
      --green: #2d6a4f;
      --red: #9b2335;
      --border: #ddd8cf;
      --text: #0d1b2a;
      --text-dim: #6b7280;
      --text-muted: #b0a898;
      --shadow: 0 4px 24px rgba(13,27,42,0.08);
      --shadow-lg: 0 12px 48px rgba(13,27,42,0.14);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.4;
      pointer-events: none;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px 80px;
      position: relative;
      z-index: 1;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 560px;
      margin-bottom: 40px;
    }

    .header-eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--copper);
      margin-bottom: 10px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(28px, 5vw, 44px);
      font-weight: 800;
      line-height: 1.05;
      color: var(--navy);
      letter-spacing: -0.03em;
    }

    h1 span {
      color: var(--copper);
      position: relative;
    }

    .header-sub {
      font-size: 14px;
      color: var(--text-dim);
      margin-top: 10px;
      font-weight: 300;
    }

    /* ── Main card ── */
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 560px;
      box-shadow: var(--shadow-lg);
    }

    /* ── Amount input ── */
    .amount-section {
      margin-bottom: 28px;
    }

    .field-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
      display: block;
    }

    .amount-input-wrap {
      position: relative;
    }

    #amount {
      width: 100%;
      padding: 16px 20px;
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--navy);
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
      letter-spacing: -0.02em;
    }

    #amount:focus { border-color: var(--copper); }

    /* ── Currency selectors ── */
    .selectors-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 12px;
      align-items: end;
      margin-bottom: 28px;
    }

    .select-wrap { position: relative; }

    .currency-select {
      width: 100%;
      padding: 14px 40px 14px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: var(--navy);
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 8px;
      outline: none;
      appearance: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .currency-select:focus { border-color: var(--copper); }

    .select-arrow {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      font-size: 12px;
    }

    /* Swap button */
    .swap-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--white);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.2s;
      color: var(--navy);
      margin-bottom: 2px;
    }

    .swap-btn:hover {
      background: var(--navy);
      color: var(--white);
      border-color: var(--navy);
      transform: rotate(180deg);
    }

    /* ── Result ── */
    .result-box {
      background: var(--navy);
      border-radius: 10px;
      padding: 24px 28px;
      margin-bottom: 28px;
      position: relative;
      overflow: hidden;
    }

    .result-box::before {
      content: '';
      position: absolute;
      top: -30px;
      right: -30px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(181,101,29,0.15);
    }

    .result-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 8px;
    }

    .result-amount {
      font-family: 'Syne', sans-serif;
      font-size: clamp(28px, 6vw, 42px);
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 6px;
      transition: all 0.2s;
    }

    .result-amount.updated {
      animation: pop 0.25s ease;
    }

    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.03); }
      100% { transform: scale(1); }
    }

    .result-rate {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
    }

    .result-rate span { color: var(--copper-light); }

    /* ── Rate grid ── */
    .rates-section {
      border-top: 1px solid var(--border);
      padding-top: 24px;
    }

    .rates-title {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    .rates-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .rate-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .rate-item:hover {
      border-color: var(--copper);
      background: var(--copper-pale);
    }

    .rate-item-pair {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 4px;
      letter-spacing: 0.05em;
    }

    .rate-item-value {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--navy);
    }

    /* ── Last updated bar ── */
    .update-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .update-text {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
    }

    .live-dot {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--green);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* ── Currency flag labels ── */
    .currency-flag {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }

    .flag { font-size: 18px; }

    .currency-name {
      font-size: 12px;
      color: var(--text-dim);
      font-weight: 300;
    }

    /* ── Footer ── */
    .footer {
      margin-top: 24px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      width: 100%;
      max-width: 560px;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .card { padding: 24px 20px; }
      .rates-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="page">

  <header>
    <div class="header-eyebrow">Central Asia · Live Rates</div>
    <h1>Currency<br/><span>Converter</span></h1>
    <p class="header-sub">TJS · RUB · UZS · KZT · AFN · AZN · USD · EUR · GBP · TRY · AED · SAR · INR · CNY · JPY</p>
  </header>

  <div class="card">

    <!-- Amount -->
    <div class="amount-section">
      <label class="field-label" for="amount">Amount</label>
      <div class="amount-input-wrap">
        <input type="number" id="amount" value="1" min="0" step="any"/>
      </div>
    </div>

    <!-- From / Swap / To -->
    <div class="selectors-row">
      <div class="select-wrap">
        <label class="field-label" for="fromCurrency">From</label>
        <select id="fromCurrency" class="currency-select"></select>
        <span class="select-arrow">▾</span>
        <div class="currency-flag" id="fromFlag"></div>
      </div>

      <button class="swap-btn" id="swapBtn" title="Swap currencies">⇄</button>

      <div class="select-wrap">
        <label class="field-label" for="toCurrency">To</label>
        <select id="toCurrency" class="currency-select"></select>
        <span class="select-arrow">▾</span>
        <div class="currency-flag" id="toFlag"></div>
      </div>
    </div>

    <!-- Result -->
    <div class="result-box">
      <div class="result-label">Result</div>
      <div class="result-amount" id="resultAmount">—</div>
      <div class="result-rate" id="resultRate">Select currencies to convert</div>
    </div>

    <!-- All rates grid -->
    <div class="rates-section">
      <div class="rates-title">All rates vs USD</div>
      <div class="rates-grid" id="ratesGrid"></div>
      <div class="update-bar">
        <span class="update-text" id="updateText">Loading rates…</span>
        <span class="live-dot"><span class="dot"></span> Live</span>
      </div>
    </div>

  </div>

  <div class="footer">
    Built with HTML · CSS · JS · Python API · Open Source
  </div>

</div>

<script>
// ─────────────────────────────────────────────
//  CURRENCY CONFIG
// ─────────────────────────────────────────────
const CURRENCIES = {
  TJS: { name: "Tajik Somoni",        flag: "🇹🇯", symbol: "SM"  },
  RUB: { name: "Russian Ruble",       flag: "🇷🇺", symbol: "₽"   },
  UZS: { name: "Uzbek Sum",           flag: "🇺🇿", symbol: "сўм" },
  KZT: { name: "Kazakh Tenge",        flag: "🇰🇿", symbol: "₸"   },
  AFN: { name: "Afghan Afghani",      flag: "🇦🇫", symbol: "؋"   },
  AZN: { name: "Azerbaijani Manat",   flag: "🇦🇿", symbol: "₼"   },
  USD: { name: "US Dollar",           flag: "🇺🇸", symbol: "$"   },
  EUR: { name: "Euro",                flag: "🇪🇺", symbol: "€"   },
  GBP: { name: "British Pound",       flag: "🇬🇧", symbol: "£"   },
  TRY: { name: "Turkish Lira",        flag: "🇹🇷", symbol: "₺"   },
  AED: { name: "UAE Dirham",          flag: "🇦🇪", symbol: "د.إ" },
  SAR: { name: "Saudi Riyal",         flag: "🇸🇦", symbol: "﷼"   },
  INR: { name: "Indian Rupee",        flag: "🇮🇳", symbol: "₹"   },
  CNY: { name: "Chinese Yuan",        flag: "🇨🇳", symbol: "¥"   },
  JPY: { name: "Japanese Yen",        flag: "🇯🇵", symbol: "¥"   },
};

// ─────────────────────────────────────────────
//  RATES  (USD base = 1.0)
//
//  These are fallback rates built into the app.
//  When you run fetch_rates.py, it overwrites
//  rates.json with live data, and this app
//  loads that file automatically.
// ─────────────────────────────────────────────
let rates = {
  USD: 1.0,
  TJS: 10.92,
  RUB: 90.50,
  UZS: 12650.0,
  KZT: 450.0,
  AFN: 71.50,
  AZN: 1.70,
  EUR: 0.92,
  GBP: 0.79,
  TRY: 32.50,
  AED: 3.67,
  SAR: 3.75,
  INR: 83.50,
  CNY: 7.24,
  JPY: 151.50,
  _updated: "Built-in fallback rates"
};

// ─────────────────────────────────────────────
//  TRY TO LOAD rates.json (generated by Python)
// ─────────────────────────────────────────────
async function loadRates() {
  try {
    const res = await fetch("rates.json");
    if (res.ok) {
      const data = await res.json();
      rates = data;
      document.getElementById("updateText").textContent =
        "Updated: " + (data._updated || "recently");
    } else {
      document.getElementById("updateText").textContent =
        "Using built-in rates · Run fetch_rates.py for live data";
    }
  } catch {
    document.getElementById("updateText").textContent =
      "Using built-in rates · Run fetch_rates.py for live data";
  }
  buildRatesGrid();
  convert();
}

// ─────────────────────────────────────────────
//  BUILD SELECT DROPDOWNS
// ─────────────────────────────────────────────
function buildSelects() {
  const fromSel = document.getElementById("fromCurrency");
  const toSel   = document.getElementById("toCurrency");

  Object.entries(CURRENCIES).forEach(([code, info]) => {
    const optFrom = new Option(`${info.flag}  ${code} — ${info.name}`, code);
    const optTo   = new Option(`${info.flag}  ${code} — ${info.name}`, code);
    fromSel.add(optFrom);
    toSel.add(optTo);
  });

  fromSel.value = "USD";
  toSel.value   = "TJS";
  updateFlags();
}

// ─────────────────────────────────────────────
//  UPDATE FLAG LABELS
// ─────────────────────────────────────────────
function updateFlags() {
  const from = document.getElementById("fromCurrency").value;
  const to   = document.getElementById("toCurrency").value;
  document.getElementById("fromFlag").innerHTML =
    `<span class="flag">${CURRENCIES[from].flag}</span><span class="currency-name">${CURRENCIES[from].name}</span>`;
  document.getElementById("toFlag").innerHTML =
    `<span class="flag">${CURRENCIES[to].flag}</span><span class="currency-name">${CURRENCIES[to].name}</span>`;
}

// ─────────────────────────────────────────────
//  CONVERT
// ─────────────────────────────────────────────
function convert() {
  const amount = parseFloat(document.getElementById("amount").value) || 0;
  const from   = document.getElementById("fromCurrency").value;
  const to     = document.getElementById("toCurrency").value;

  // Convert via USD base
  const inUSD  = amount / rates[from];
  const result = inUSD * rates[to];

  const resultEl = document.getElementById("resultAmount");
  const rateEl   = document.getElementById("resultRate");

  // Format nicely
  const formatted = result >= 1000
    ? result.toLocaleString("en-US", { maximumFractionDigits: 2 })
    : result.toFixed(4);

  resultEl.textContent = `${CURRENCIES[to].symbol} ${formatted}`;
  resultEl.classList.remove("updated");
  void resultEl.offsetWidth; // reflow to restart animation
  resultEl.classList.add("updated");

  const rate1 = (rates[to] / rates[from]).toFixed(4);
  rateEl.innerHTML = `1 ${from} = <span>${rate1} ${to}</span>`;

  updateFlags();
}

// ─────────────────────────────────────────────
//  RATES GRID  (all vs USD)
// ─────────────────────────────────────────────
function buildRatesGrid() {
  const grid = document.getElementById("ratesGrid");
  grid.innerHTML = "";
  Object.keys(CURRENCIES).forEach(code => {
    if (code === "USD") return;
    const rate = rates[code];
    if (!rate) return;
    const item = document.createElement("div");
    item.className = "rate-item";
    item.innerHTML = `
      <div class="rate-item-pair">${CURRENCIES[code].flag} USD → ${code}</div>
      <div class="rate-item-value">${CURRENCIES[code].symbol} ${rate.toLocaleString("en-US", { maximumFractionDigits: 2 })}</div>
    `;
    // Clicking a rate item sets the converter to that pair
    item.addEventListener("click", () => {
      document.getElementById("fromCurrency").value = "USD";
      document.getElementById("toCurrency").value = code;
      convert();
    });
    grid.appendChild(item);
  });
}

// ─────────────────────────────────────────────
//  SWAP BUTTON
// ─────────────────────────────────────────────
document.getElementById("swapBtn").addEventListener("click", () => {
  const from = document.getElementById("fromCurrency");
  const to   = document.getElementById("toCurrency");
  [from.value, to.value] = [to.value, from.value];
  convert();
});

// ─────────────────────────────────────────────
//  EVENTS
// ─────────────────────────────────────────────
document.getElementById("amount").addEventListener("input", convert);
document.getElementById("fromCurrency").addEventListener("change", convert);
document.getElementById("toCurrency").addEventListener("change", convert);

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
buildSelects();
loadRates();
</script>
</body>
</html>
